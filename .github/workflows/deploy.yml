name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push server image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tradespace-server:latest
      - name: Build and push client image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.client
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tradespace-client:latest

  deploy-ssh:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tradespace-server:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tradespace-client:latest
            docker compose -f docker/compose-traefik.yml up -d --build

# Notes: set secrets DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY.
