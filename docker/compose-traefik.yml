version: '3.8'
services:
  traefik:
    image: traefik:2.10
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.myresolver.acme.httpchallenge=true
      - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.myresolver.acme.email=your-email@example.com
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-net

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: tradespace-server
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradespace-server.rule=Host(`YOUR_DOMAIN_HERE`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tradespace-server.entrypoints=websecure"
      - "traefik.http.routers.tradespace-server.tls.certresolver=myresolver"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_ORIGIN=https://YOUR_DOMAIN_HERE
    networks:
      - traefik-net

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: tradespace-client
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradespace-client.rule=Host(`YOUR_DOMAIN_HERE`)"
      - "traefik.http.routers.tradespace-client.entrypoints=websecure"
      - "traefik.http.routers.tradespace-client.tls.certresolver=myresolver"
    networks:
      - traefik-net
    depends_on:
      - server

volumes:
  traefik_letsencrypt:

networks:
  traefik-net:
    driver: bridge

# Replace YOUR_DOMAIN_HERE and your-email@example.com before use.
